name: MEXC Launchpad Monitor

on:
  schedule:
    # 北京时间 09:00 / 16:00 / 20:00 = UTC 01:00 / 08:00 / 12:00
    - cron: "0 1,8,12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: mexc-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Chinese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv >/dev/null
          rm -rf ~/.cache/matplotlib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
        run: python -u monitor.py

      - name: Commit updated chart and data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chart.png data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "monitor: $(TZ=Asia/Shanghai date '+%m/%d %H:%M')"
            git push
          fi
